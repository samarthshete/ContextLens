# ``backend`` and ``worker`` share the same image so one ``docker compose build`` refreshes both
# (avoids stale ``worker`` missing deps like ``openai`` after ``pyproject.toml`` changes).
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: contextlens
    ports:
      - "5433:5432"
    volumes:
      - contextlens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: contextlens-backend:latest
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/contextlens
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      # Optional: comma-separated browser origins (default in app/config.py if unset)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      # Optional demo write gate — same value must be entered in the SPA session (see docs/DEPLOYMENT.md)
      CONTEXTLENS_WRITE_KEY: ${CONTEXTLENS_WRITE_KEY:-}
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    image: contextlens-backend:latest
    command: ["./scripts/rq_worker.sh"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/contextlens
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CONTEXTLENS_WRITE_KEY: ${CONTEXTLENS_WRITE_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  contextlens_pgdata:
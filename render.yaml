# Render Blueprint — ContextLens API + RQ worker + Postgres + Key Value (Redis-compatible)
#
# Docs: https://render.com/docs/blueprint-spec
#
# After first sync, complete in the Render Dashboard:
# - Set CORS_ORIGINS to your Vercel origin(s), e.g. https://your-app.vercel.app
# - Set OPENAI_API_KEY (and CLAUDE_API_KEY if using anthropic) once — the env group applies to API + worker
# - Copy CONTEXTLENS_WRITE_KEY from the API service (generated) for operators / SPA unlock
#
# Vercel: create project with Root Directory = frontend, set VITE_API_BASE=https://<contextlens-api>.onrender.com/api/v1
#
# pgvector: Alembic runs CREATE EXTENSION IF NOT EXISTS vector — supported on Render Postgres 13+
# https://render.com/docs/postgresql-extensions

envVarGroups:
  - name: contextlens-llm
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false

databases:
  - name: contextlens-pg
    databaseName: contextlens
    postgresMajorVersion: "16"

services:
  - type: keyvalue
    name: contextlens-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: Render platform connectivity

  - type: web
    name: contextlens-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contextlens-pg
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: contextlens-redis
          property: connectionString
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: CONTEXTLENS_WRITE_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: openai
      - fromGroup: contextlens-llm
      - key: UPLOAD_DIR
        value: /tmp/contextlens-uploads

  - type: worker
    name: contextlens-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: ./scripts/rq_worker.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contextlens-pg
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: contextlens-redis
          property: connectionString
      - key: LLM_PROVIDER
        value: openai
      - fromGroup: contextlens-llm
      - key: UPLOAD_DIR
        value: /tmp/contextlens-uploads
